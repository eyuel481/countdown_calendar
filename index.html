<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethio-Flow Forever</title>
    <style>
        :root { --eth-blue: #1976D2; --adwa-red: #B71C1C; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f2f5; display: flex; height: 100vh; flex-direction: column; overflow: hidden; }
        .header { background: var(--eth-blue); color: white; padding: 14px; font-weight: bold; text-align: center; }
        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 12px; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .info-box { background: #fff; border-radius: 12px; padding: 10px; text-align: center; border: 2px solid #eee; }
        .box-label { font-size: 0.65em; color: #666; font-weight: 800; display: block; }
        .box-value { font-size: 0.9em; color: #222; font-weight: bold; }
        
        .calendar-wrapper { flex: 1; display: flex; overflow-x: auto; scroll-snap-type: x mandatory; padding: 20px 0; gap: 25px; align-items: center; padding-inline: 15vw; scroll-behavior: smooth; }
        .calendar-wrapper::-webkit-scrollbar { display: none; }
        .month-card { min-width: 320px; background: white; border-radius: 24px; scroll-snap-align: center; flex-shrink: 0; height: 440px; display: flex; flex-direction: column; box-shadow: 0 4px 15px rgba(0,0,0,0.08); border: 1px solid #ddd; }
        .month-title { padding: 12px; font-weight: 900; text-align: center; font-size: 1.1em; border-bottom: 1px solid #f0f0f0; color: var(--eth-blue); }
        .days-header { display: grid; grid-template-columns: repeat(7, 1fr); background: #f8f9fa; color: #666; text-align: center; padding: 8px 0; font-size: 0.7em; font-weight: bold; }
        
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); background: #eee; gap: 1px; flex: 1; }
        .cell { background: white; display: flex; align-items: center; justify-content: center; font-weight: 700; cursor: pointer; font-size: 0.9rem; }
        .empty { background: #fdfdfd; cursor: default; }
        
        .today-mark { background: var(--eth-blue) !important; color: white !important; border-radius: 8px; width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; }

        #countdownContainer { max-height: 200px; overflow-y: auto; background: #1a1a1a; padding: 12px; border-top: 4px solid var(--eth-blue); }
        .countdown-item { background: #2a2a2a; color: white; margin-bottom: 8px; padding: 12px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--adwa-red); }
        .item-timer { font-family: monospace; color: #00ff00; font-size: 1rem; }

        #countdownModal { display: none; position: fixed; bottom: 0; width: 100%; background: white; padding: 25px; border-radius: 25px 25px 0 0; z-index: 2000; box-sizing: border-box; }
        #overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1500; }
    </style>
</head>
<body>

    <div class="header">የኢትዮጵያ ዘመን አቆጣጠር 2018</div>

    <div class="dashboard">
        <div class="info-box"><span class="box-label">ዛሬ</span><span class="box-value">የካቲት 23</span></div>
        <div class="info-box"><span class="box-label">ወር</span><span class="box-value">የካቲት</span></div>
        <div class="info-box"><span class="box-label">ዓመት</span><span class="box-value">2018</span></div>
    </div>

    <div class="calendar-wrapper" id="main-calendar"></div>

    <div id="countdownContainer"><div id="listBody"></div></div>

    <div id="overlay" onclick="closeModal()"></div>
    <div id="countdownModal">
        <h3 id="modalHead">New Countdown ⏳</h3>
        <input type="text" id="userNote" placeholder="Event Name..." style="width:100%; padding:15px; border:1px solid #ddd; border-radius:12px; margin-bottom:15px; box-sizing:border-box;">
        <button onclick="addCountdown()" style="background:var(--eth-blue); color:white; border:none; padding:15px; border-radius:12px; width:100%; font-weight:bold;">Start</button>
    </div>

    <script>
        const amhMonths = ["መስከረም", "ጥቅምት", "ኅዳር", "ታኅሣሥ", "ጥር", "የካቲት", "መጋቢት", "ሚያዝያ", "ግንቦት", "ሰኔ", "ሐምሌ", "ነሐሴ", "ጳጉሜን"];
        // Correct weekday offsets for 2018 E.C. (Thursday = 3)
        const offsets2018 = [3, 5, 0, 2, 4, 6, 1, 3, 5, 0, 2, 4, 6]; 
        
        // *** PERMANENT KEY NAME ***
        const DB_KEY = 'ethioFlow_User_Data';
        
        let countdowns = JSON.parse(localStorage.getItem(DB_KEY)) || [];
        let targetDay, targetMonthIdx, targetMonthName;

        function generateCalendar() {
            const wrapper = document.getElementById('main-calendar');
            wrapper.innerHTML = "";
            amhMonths.forEach((name, mIdx) => {
                const daysInMonth = (mIdx === 12) ? 6 : 30; 
                const startOffset = offsets2018[mIdx];
                let cellsHtml = "";

                for (let e = 0; e < startOffset; e++) {
                    cellsHtml += `<div class="cell empty"></div>`;
                }

                for (let i = 1; i <= daysInMonth; i++) {
                    const isToday = (name === "የካቲት" && i === 23);
                    const cellContent = isToday ? `<div class="today-mark">${i}</div>` : i;
                    cellsHtml += `<div class="cell" onclick="openModal('${name}', ${i}, ${mIdx})">${cellContent}</div>`;
                }
                wrapper.innerHTML += `
                    <div class="month-card" id="month-${mIdx}">
                        <div class="month-title">${name} 2018</div>
                        <div class="days-header"><span>ሰኞ</span><span>ማክ</span><span>ረቡ</span><span>ሐሙ</span><span>አር</span><span>ቅዳ</span><span>እሁ</span></div>
                        <div class="grid">${cellsHtml}</div>
                    </div>`;
            });
            setTimeout(() => document.getElementById('month-5').scrollIntoView({inline:'center'}), 300);
            renderList();
        }

        function openModal(month, day, mIdx) {
            targetDay = day; targetMonthIdx = mIdx; targetMonthName = month;
            document.getElementById('modalHead').innerText = `Set for: ${month} ${day}`;
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('countdownModal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('countdownModal').style.display = 'none';
        }

        function addCountdown() {
            const note = document.getElementById('userNote').value || "Event";
            const diffInDays = ((targetMonthIdx * 30) + targetDay) - ((5 * 30) + 23);
            if(diffInDays < 0) { alert("Select a future date!"); return; }

            const targetTimestamp = new Date().setHours(24, 0, 0, 0) + ((diffInDays - 1) * 86400000);
            countdowns.push({ id: Date.now(), note, targetTimestamp, monthName: targetMonthName, day: targetDay });
            
            // Save using the permanent DB_KEY
            localStorage.setItem(DB_KEY, JSON.stringify(countdowns));
            document.getElementById('userNote').value = "";
            closeModal();
            renderList();
        }

        function renderList() {
            const list = document.getElementById('listBody');
            list.innerHTML = countdowns.length === 0 ? '<div style="color:#666; text-align:center; font-size:0.8em;">No Active Events</div>' : "";
            countdowns.forEach(item => {
                list.innerHTML += `<div class="countdown-item"><div><div style="font-size:0.7em; color:#aaa;">${item.note}</div><div class="item-timer" id="timer-${item.id}">--:--:--</div></div><button style="background:#444; color:white; border:none; border-radius:5px; padding:5px 10px;" onclick="deleteItem(${item.id})">×</button></div>`;
            });
        }

        function deleteItem(id) {
            countdowns = countdowns.filter(c => c.id !== id);
            localStorage.setItem(DB_KEY, JSON.stringify(countdowns));
            renderList();
        }

        setInterval(() => {
            const now = Date.now();
            countdowns.forEach(item => {
                const el = document.getElementById(`timer-${item.id}`);
                if(!el) return;
                const dist = item.targetTimestamp - now;
                if(dist < 0) { el.innerText = "DUE NOW!"; return; }
                const d = Math.floor(dist / 86400000);
                const h = Math.floor((dist % 86400000) / 3600000);
                const m = Math.floor((dist % 3600000) / 60000);
                const s = Math.floor((dist % 60000) / 1000);
                el.innerText = `${d}d ${h}h ${m}m ${s}s`;
            });
        }, 1000);

        window.onload = generateCalendar;
    </script>
</body>
</html>
