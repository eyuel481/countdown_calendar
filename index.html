<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-status-bar-style" content="black-translucent">
    <title>Ethio-Flow Pro</title>
    <style>
        :root { --eth-blue: #1976D2; --adwa-red: #B71C1C; --bg: #f4f7f9; }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background: var(--bg); font-family: 'Segoe UI', sans-serif; }
        body { display: flex; flex-direction: column; }
        .header { background: var(--eth-blue); color: white; padding: 20px 16px 12px; font-weight: 800; text-align: center; }
        .calendar-wrapper { flex: 1; display: flex; overflow-x: auto; scroll-snap-type: x mandatory; padding: 20px 0; gap: 25px; align-items: flex-start; padding-inline: 12vw; scroll-behavior: smooth; }
        .calendar-wrapper::-webkit-scrollbar { display: none; }
        .month-card { min-width: 310px; background: white; border-radius: 24px; scroll-snap-align: center; flex-shrink: 0; box-shadow: 0 8px 20px rgba(0,0,0,0.06); border: 1px solid #eee; overflow: hidden; }
        .month-title { padding: 15px; font-weight: 800; text-align: center; color: var(--eth-blue); border-bottom: 1px solid #f0f0f0; }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); background: #eee; gap: 1px; }
        .cell { background: white; height: 50px; display: flex; align-items: center; justify-content: center; font-weight: 700; cursor: pointer; }
        .today-mark { background: var(--eth-blue); color: white; border-radius: 8px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; }
        #countdownContainer { max-height: 280px; overflow-y: auto; background: #121212; padding: 15px; border-top: 4px solid var(--eth-blue); }
        .countdown-item { background: #1e1e1e; color: white; margin-bottom: 10px; padding: 14px; border-radius: 14px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--adwa-red); }
        .item-timer { font-family: 'Courier New', monospace; color: #00ff00; font-size: 1.1em; font-weight: bold; }
        .btn-test { background: #333; color: #00ff00; border: 1px solid #444; padding: 5px 10px; border-radius: 5px; font-size: 10px; margin-top: 10px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>

    <div class="header">የኢትዮጵያ ዘመን አቆጣጠር 2018</div>
    <div class="calendar-wrapper" id="main-calendar"></div>
    
    <div id="countdownContainer">
        <div id="listBody"></div>
        <button class="btn-test" onclick="sendTestPush()">🔔 Test Notification Sound</button>
    </div>

    <script>
        // 1. PERMANENT STORAGE KEY (Universal)
        const DB_KEY = 'ETHIO_FLOW_FINAL_SAFE';
        let countdowns = JSON.parse(localStorage.getItem(DB_KEY)) || [];

        // 2. REQUEST PERSISTENCE (Ask phone not to delete data)
        if (navigator.storage && navigator.storage.persist) {
            navigator.storage.persist().then(granted => {
                if (granted) console.log("Storage will not be cleared by system.");
            });
        }

        // 3. NOTIFICATION PERMISSION
        function askNotify() {
            if ("Notification" in window) {
                Notification.requestPermission();
            }
        }

        function sendTestPush() {
            if (Notification.permission === "granted") {
                new Notification("Ethio-Flow Test", { body: "Notifications are working! ✅" });
            } else {
                Notification.requestPermission().then(permission => {
                    if (permission === "granted") new Notification("Success!", { body: "Now working!" });
                    else alert("Please allow notifications in settings.");
                });
            }
        }

        // 4. CALENDAR LOGIC
        const amhMonths = ["መስከረም", "ጥቅምት", "ኅዳር", "ታኅሣሥ", "ጥር", "የካቲት", "መጋቢት", "ሚያዝያ", "ግንቦት", "ሰኔ", "ሐምሌ", "ነሐሴ", "ጳጉሜን"];
        const offsets2018 = [3, 5, 0, 2, 4, 6, 1, 3, 5, 0, 2, 4, 4];

        function generate() {
            const wrapper = document.getElementById('main-calendar');
            amhMonths.forEach((name, mIdx) => {
                const days = (mIdx === 12) ? 6 : 30;
                let cells = "";
                for (let e = 0; e < offsets2018[mIdx]; e++) cells += `<div class="cell" style="background:#fafafa"></div>`;
                for (let i = 1; i <= days; i++) {
                    const isToday = (name === "የካቲት" && i === 23);
                    cells += `<div class="cell" onclick="addEvent('${name}', ${i}, ${mIdx})">${isToday ? `<div class="today-mark">${i}</div>` : i}</div>`;
                }
                wrapper.innerHTML += `<div class="month-card" id="m-${mIdx}"><div class="month-title">${name} 2018</div><div class="grid">${cells}</div></div>`;
            });
            setTimeout(() => document.getElementById('m-5').scrollIntoView({inline:'center'}), 300);
            render();
        }

        function addEvent(m, d, idx) {
            const note = prompt(`${m} ${d} - የዝግጅቱ ስም?`);
            if(!note) return;
            const diff = ((idx * 30) + d) - ((5 * 30) + 23);
            countdowns.push({ 
                id: Date.now(), 
                note, 
                target: new Date().setHours(24,0,0,0) + ((diff-1)*86400000),
                notified: false 
            });
            save();
        }

        function save() {
            localStorage.setItem(DB_KEY, JSON.stringify(countdowns));
            render();
        }

        function render() {
            const list = document.getElementById('listBody');
            list.innerHTML = "";
            countdowns.forEach(item => {
                list.innerHTML += `<div class="countdown-item">
                    <div><b>${item.note}</b><br><span class="item-timer" id="t-${item.id}">--:--:--</span></div>
                    <button onclick="del(${item.id})" style="background:none; border:none; color:red; font-size:20px;">×</button>
                </div>`;
            });
        }

        function del(id) { countdowns = countdowns.filter(c => c.id !== id); save(); }

        // 5. THE TIMER & AUTO-NOTIFICATION
        setInterval(() => {
            const now = Date.now();
            countdowns.forEach(item => {
                const el = document.getElementById(`t-${item.id}`);
                const dist = item.target - now;
                
                if (dist <= 0 && !item.notified) {
                    if (Notification.permission === "granted") {
                        new Notification("Ethio-Flow Reminder", { body: `ጊዜው ደርሷል: ${item.note}` });
                    }
                    item.notified = true;
                    save();
                }

                if (el) el.innerText = dist < 0 ? "ደርሷል!" : Math.floor(dist/86400000)+"ቀን "+Math.floor((dist%86400000)/3600000)+"ሰ";
            });
        }, 1000);

        window.onload = () => { generate(); askNotify(); };
        if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
        navigator.serviceWorker.register('./sw.js')
            .then(reg => console.log('Offline mode active!'))
            .catch(err => console.log('Offline setup failed', err));
    });
        }
    </script>
</body>
</html>
