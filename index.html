<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Ethio-Flow Pro</title>
    <style>
        /* [Your existing CSS styles go here - Keep them the same] */
        :root { --eth-blue: #1976D2; --adwa-red: #B71C1C; --bg: #f4f7f9; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: var(--bg); display: flex; height: 100vh; flex-direction: column; overflow: hidden; }
        .header { background: var(--eth-blue); color: white; padding: 20px 16px; font-weight: 800; text-align: center; }
        .calendar-wrapper { flex: 1; display: flex; overflow-x: auto; scroll-snap-type: x mandatory; padding: 20px 0; align-items: flex-start; padding-inline: 12vw; }
        .month-card { min-width: 310px; background: white; border-radius: 24px; scroll-snap-align: center; margin-right: 20px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); }
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); background: #eee; gap: 1px; }
        .cell { background: white; height: 50px; display: flex; align-items: center; justify-content: center; font-weight: 700; }
        #countdownContainer { max-height: 250px; overflow-y: auto; background: #121212; padding: 15px; border-top: 4px solid var(--eth-blue); }
        .countdown-item { background: #1e1e1e; color: white; margin-bottom: 10px; padding: 14px; border-radius: 14px; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

    <iframe id="storageBridge" src="storage.html" style="display:none;"></iframe>

    <div class="header">የኢትዮጵያ ዘመን አቆጣጠር 2018</div>
    <div class="calendar-wrapper" id="main-calendar"></div>
    <div id="countdownContainer"><div id="listBody"></div></div>

    <script>
        const bridge = document.getElementById('storageBridge');
        let countdowns = [];

        // 1. TALK TO THE SAFE
        window.addEventListener('message', function(event) {
            if (event.data.type === 'LOAD_DATA') {
                countdowns = event.data.payload;
                renderList();
            }
        });

        // Load data when the safe is ready
        bridge.onload = () => {
            bridge.contentWindow.postMessage({ type: 'GET' }, '*');
        };

        function saveData() {
            bridge.contentWindow.postMessage({ type: 'SAVE', payload: countdowns }, '*');
            renderList();
        }

        // [Rest of your Calendar Logic - copy from previous working version]
        const amhMonths = ["መስከረም", "ጥቅምት", "ኅዳር", "ታኅሣሥ", "ጥር", "የካቲት", "መጋቢት", "ሚያዝያ", "ግንቦት", "ሰኔ", "ሐምሌ", "ነሐሴ", "ጳጉሜን"];
        const offsets2018 = [3, 5, 0, 2, 4, 6, 1, 3, 5, 0, 2, 4, 4]; 

        function generateCalendar() {
            const wrapper = document.getElementById('main-calendar');
            amhMonths.forEach((name, mIdx) => {
                let cellsHtml = "";
                const startOffset = offsets2018[mIdx];
                for (let e = 0; e < startOffset; e++) cellsHtml += `<div class="cell empty"></div>`;
                for (let i = 1; i <= (mIdx === 12 ? 6 : 30); i++) {
                    cellsHtml += `<div class="cell">${i}</div>`;
                }
                wrapper.innerHTML += `<div class="month-card"><div style="padding:15px; text-align:center; font-weight:bold;">${name}</div><div class="grid">${cellsHtml}</div></div>`;
            });
        }

        function renderList() {
            const list = document.getElementById('listBody');
            list.innerHTML = countdowns.length === 0 ? '<div style="color:white; text-align:center;">No Events</div>' : "";
            countdowns.forEach(item => {
                list.innerHTML += `<div class="countdown-item"><span>${item.note}</span></div>`;
            });
        }

        window.onload = generateCalendar;
    </script>
</body>
</html>
