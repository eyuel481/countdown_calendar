<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Ethio-Flow Pro</title>
    <style>
        :root { --eth-blue: #1976D2; --adwa-red: #B71C1C; --bg: #f4f7f9; }
        html, body { height: 100%; margin: 0; padding: 0; overflow: hidden; background: var(--bg); font-family: 'Segoe UI', sans-serif; }
        body { display: flex; flex-direction: column; }

        /* Header & Dashboard */
        .header { background: var(--eth-blue); color: white; padding: 25px 16px 12px; font-weight: 800; text-align: center; }
        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 12px; background: white; border-bottom: 1px solid #ddd; }
        .info-box { background: #f8f9fa; border-radius: 12px; padding: 10px; text-align: center; border: 1px solid #eee; }
        .box-label { font-size: 0.6em; color: #666; font-weight: 800; display: block; }
        .box-value { font-size: 0.85em; color: #222; font-weight: 700; }

        /* Calendar Styling */
        .calendar-wrapper { flex: 1; display: flex; overflow-x: auto; scroll-snap-type: x mandatory; padding: 20px 0; gap: 25px; align-items: flex-start; padding-inline: 12vw; scroll-behavior: smooth; }
        .calendar-wrapper::-webkit-scrollbar { display: none; }
        
        .month-card { min-width: 310px; background: white; border-radius: 24px; scroll-snap-align: center; flex-shrink: 0; box-shadow: 0 8px 20px rgba(0,0,0,0.06); border: 1px solid #eee; overflow: hidden; }
        .month-title { padding: 15px; font-weight: 800; text-align: center; color: var(--eth-blue); }
        .days-header { display: grid; grid-template-columns: repeat(7, 1fr); background: #f1f5f9; color: #334155; text-align: center; padding: 10px 0; font-size: 0.75em; font-weight: 900; border-bottom: 1px solid #e2e8f0; }
        
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); background: #cbd5e1; gap: 1px; }
        .cell { background: white; height: 50px; display: flex; align-items: center; justify-content: center; font-weight: 700; cursor: pointer; font-size: 1em; }
        .empty { background: #f8fafc; }
        
        /* The Circle for Today */
        .today-mark { background: var(--eth-blue) !important; color: white !important; border-radius: 50%; width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 10px rgba(25, 118, 210, 0.4); }

        #countdownContainer { max-height: 250px; overflow-y: auto; background: #121212; padding: 15px; border-top: 4px solid var(--eth-blue); }
        .countdown-item { background: #1e1e1e; color: white; margin-bottom: 10px; padding: 14px; border-radius: 14px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--adwa-red); }
        .item-timer { font-family: 'Courier New', monospace; color: #00ff00; font-weight: bold; font-size: 0.85em; }
    </style>
</head>
<body>

    <iframe id="storageBridge" src="storage.html" style="display:none;"></iframe>

    <div class="header">የኢትዮጵያ ዘመን አቆጣጠር 2018</div>
    
    <div class="dashboard">
        <div class="info-box"><span class="box-label">ዛሬ</span><span id="live-day" class="box-value">--</span></div>
        <div class="info-box"><span class="box-label">ወር</span><span id="live-month" class="box-value">--</span></div>
        <div class="info-box"><span class="box-label">ዓመት</span><span class="box-value">2018</span></div>
    </div>

    <div class="calendar-wrapper" id="main-calendar"></div>
    <div id="countdownContainer"><div id="listBody"></div></div>

    <script>
        const amhMonths = ["መስከረም", "ጥቅምት", "ኅዳር", "ታኅሣሥ", "ጥር", "የካቲት", "መጋቢት", "ሚያዝያ", "ግንቦት", "ሰኔ", "ሐምሌ", "ነሐሴ", "ጳጉሜን"];
        const dayNames = ["ሰኞ", "ማክ", "ረቡ", "ሐሙ", "አር", "ቅዳ", "እሁ"];
        const offsets2018 = [3, 5, 0, 2, 4, 6, 1, 3, 5, 0, 2, 4, 4];
        
        const bridge = document.getElementById('storageBridge');
        let countdowns = [];

        // 1. LIVE DATE ENGINE (Calculates Ethio Date from phone clock)
        function getEthioDate() {
            const now = new Date();
            const startOfEthioYear = new Date("2025-09-11"); // Meskerem 1, 2018
            const diffMs = now - startOfEthioYear;
            const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
            
            let mIdx = Math.floor(diffDays / 30);
            let day = (diffDays % 30) + 1;
            
            if (mIdx > 12) { mIdx = 12; day = diffDays - 360 + 1; }
            
            // Update Dashboard UI
            document.getElementById('live-day').innerText = day;
            document.getElementById('live-month').innerText = amhMonths[mIdx];
            
            return { mIdx, day };
        }

        // 2. STORAGE LINKING
        window.addEventListener('message', (e) => {
            if (e.data.type === 'LOAD_DATA') { countdowns = e.data.payload; render(); }
        });
        bridge.onload = () => bridge.contentWindow.postMessage({ type: 'GET' }, '*');

        // 3. CALENDAR GENERATION
        function generateCalendar() {
            const wrapper = document.getElementById('main-calendar');
            const today = getEthioDate();
            wrapper.innerHTML = "";

            amhMonths.forEach((name, mIdx) => {
                const daysInMonth = (mIdx === 12) ? 6 : 30;
                let dayHeaderHtml = `<div class="days-header">${dayNames.map(d => `<span>${d}</span>`).join('')}</div>`;

                let cells = "";
                // Empty slots
                for (let e = 0; e < offsets2018[mIdx]; e++) cells += `<div class="cell empty"></div>`;
                // Days
                for (let i = 1; i <= daysInMonth; i++) {
                    const isToday = (mIdx === today.mIdx && i === today.day);
                    cells += `<div class="cell" onclick="addEvent('${name}', ${i}, ${mIdx})">
                        ${isToday ? `<div class="today-mark">${i}</div>` : i}
                    </div>`;
                }

                wrapper.innerHTML += `
                    <div class="month-card" id="m-${mIdx}">
                        <div class="month-title">${name} 2018</div>
                        ${dayHeaderHtml}
                        <div class="grid">${cells}</div>
                    </div>`;
            });

            // Scroll to the current month automatically
            setTimeout(() => {
                const currentMonthEl = document.getElementById('m-' + today.mIdx);
                if(currentMonthEl) currentMonthEl.scrollIntoView({inline:'center'});
            }, 300);
            render();
        }

        function addEvent(m, d, idx) {
            const note = prompt(`${m} ${d} - Event?`);
            if(!note) return;
            const startYear = new Date("2025-09-11").getTime();
            const targetTime = startYear + (((idx * 30) + (d - 1)) * 86400000);
            countdowns.push({ id: Date.now(), note, target: targetTime, m, d });
            bridge.contentWindow.postMessage({ type: 'SAVE', payload: countdowns }, '*');
            render();
        }

        function render() {
            const list = document.getElementById('listBody');
            list.innerHTML = "";
            countdowns.forEach(item => {
                list.innerHTML += `<div class="countdown-item">
                    <div><b>${item.note}</b><br><small>${item.m} ${item.d}</small></div>
                    <span class="item-timer" id="t-${item.id}">--:--:--:--</span>
                    <button onclick="del(${item.id})" style="background:none; border:none; color:red; font-size:1.5em;">×</button>
                </div>`;
            });
        }

        function del(id) { 
            countdowns = countdowns.filter(c => c.id !== id); 
            bridge.contentWindow.postMessage({ type: 'SAVE', payload: countdowns }, '*');
            render(); 
        }

        setInterval(() => {
            const now = Date.now();
            countdowns.forEach(item => {
                const el = document.getElementById(`t-${item.id}`);
                if (!el) return;
                const dist = item.target - now;
                if (dist < 0) { el.innerText = "ደርሷል!"; } 
                else {
                    const d = Math.floor(dist / 86400000);
                    const h = Math.floor((dist % 86400000) / 3600000);
                    const m = Math.floor((dist % 3600000) / 60000);
                    const s = Math.floor((dist % 60000) / 1000);
                    el.innerText = `${d}ቀን ${h}ሰ ${m}ደ ${s}ሰ`;
                }
            });
        }, 1000);

        window.onload = generateCalendar;
    </script>
</body>
</html>
