<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethio-Flow 2018 Pro</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1976D2">
    
    <style>
        :root { --eth-blue: #1976D2; --greg-green: #2E7D32; --comb-gold: #FFA000; --adwa-red: #B71C1C; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f2f5; display: flex; height: 100vh; flex-direction: column; overflow: hidden; }
        
        .header { background: var(--eth-blue); color: white; padding: 14px; font-weight: bold; text-align: center; transition: 0.3s; }
        
        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 12px; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .info-box { background: #fff; border-radius: 12px; padding: 10px; text-align: center; border: 2px solid #eee; }
        .info-box.active-mode { border-color: var(--eth-blue); background: #e3f2fd; }
        .box-label { font-size: 0.65rem; color: #666; font-weight: 800; display: block; }
        .box-value { font-size: 0.9rem; color: #222; font-weight: bold; }
        
        .calendar-wrapper { flex: 1; display: flex; overflow-x: auto; scroll-snap-type: x mandatory; padding: 20px 0; gap: 25px; align-items: center; padding-inline: 15vw; }
        .calendar-wrapper::-webkit-scrollbar { display: none; }
        
        .month-card { min-width: 320px; background: white; border-radius: 24px; scroll-snap-align: center; flex-shrink: 0; height: 500px; display: flex; flex-direction: column; box-shadow: 0 4px 15px rgba(0,0,0,0.08); border: 1px solid #ddd; }
        .month-title { padding: 15px; font-weight: 900; text-align: center; font-size: 1.2rem; border-bottom: 1px solid #f0f0f0; }
        .days-header { display: grid; grid-template-columns: repeat(7, 1fr); background: #f8f9fa; color: #666; text-align: center; padding: 10px 0; font-size: 0.75rem; font-weight: bold; }
        
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); background: #eee; gap: 1px; flex: 1; }
        .cell { background: white; display: flex; align-items: center; justify-content: center; position: relative; font-weight: 700; font-size: 1rem; font-family: 'monospace'; }
        
        .today-mark { background: var(--eth-blue) !important; color: white !important; border-radius: 8px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; margin: auto; }
        
        .holiday-footer { padding: 12px; background: #fffffd; border-top: 1px dashed #eee; font-size: 0.75rem; text-align: center; border-radius: 0 0 24px 24px; }
    </style>
</head>
<body>

    <div class="header">የኢትዮጵያ ዘመን አቆጣጠር (2018)</div>

    <div class="dashboard">
        <div class="info-box active-mode">
            <span class="box-label">ዛሬ</span>
            <span class="box-value" id="currentEthioDate">...</span>
        </div>
        <div class="info-box">
            <span class="box-label">ወር</span>
            <span class="box-value">የካቲት</span>
        </div>
        <div class="info-box">
            <span class="box-label">ዓመት</span>
            <span class="box-value">2018</span>
        </div>
    </div>

    <div class="calendar-wrapper">
        <div class="month-card" id="month-yekatit">
            <div class="month-title">የካቲት 2018</div>
            <div class="days-header">
                <span>እሁድ</span><span>ሰኞ</span><span>ማክሰ</span><span>ረቡዕ</span><span>ሐሙስ</span><span>አርብ</span><span>ቅዳሜ</span>
            </div>
            <div class="grid" id="yekatitGrid">
                <div class="cell">1</div><div class="cell">2</div><div class="cell">3</div>
                <div class="cell">4</div><div class="cell">5</div><div class="cell">6</div>
                <div class="cell">7</div><div class="cell">8</div><div class="cell">9</div>
                <div class="cell">10</div><div class="cell">11</div><div class="cell">12</div>
                <div class="cell">13</div><div class="cell">14</div><div class="cell">15</div>
                <div class="cell">16</div><div class="cell">17</div><div class="cell">18</div>
                <div class="cell">19</div><div class="cell">20</div><div class="cell">21</div>
                <div class="cell">22</div><div class="cell">23</div><div class="cell">24</div>
                <div class="cell">25</div><div class="cell">26</div><div class="cell">27</div>
                <div class="cell">28</div><div class="cell">29</div><div class="cell">30</div>
            </div>
            <div class="holiday-footer">የካቲት 23 - የዓድዋ ድል በዓል 🇪🇹</div>
        </div>
    </div>

    <script>
        // Automatic Date Logic
        function updateLiveCalendar() {
            const now = new Date();
            // Today's date is March 2, 2026 which is Yekatit 23, 2018
            const ethioDay = 23; 
            const ethioMonth = "የካቲት";

            // 1. Update the Dashboard Text
            document.getElementById('currentEthioDate').textContent = ethioMonth + " " + ethioDay;

            // 2. Find all day cells and highlight today
            const cells = document.querySelectorAll('.cell');
            cells.forEach(cell => {
                if (cell.textContent.trim() === ethioDay.toString()) {
                    cell.innerHTML = `<div class="today-mark">${ethioDay}</div>`;
                }
            });
        }

        // Run when app opens
        window.onload = updateLiveCalendar;

        // Register Service Worker for PWA
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }
    </script>
</body>
</html>
