<!DOCTYPE html>
<html lang="am">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ethio-Flow Precision</title>
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="theme-color" content="#1976D2">
    <style>
        :root { --eth-blue: #1976D2; --adwa-red: #B71C1C; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f0f2f5; display: flex; height: 100vh; flex-direction: column; overflow: hidden; }
        
        .header { background: var(--eth-blue); color: white; padding: 14px; font-weight: bold; text-align: center; }
        
        .dashboard { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 12px; background: #fff; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .info-box { background: #fff; border-radius: 12px; padding: 10px; text-align: center; border: 2px solid #eee; }
        .box-label { font-size: 0.65em; color: #666; font-weight: 800; display: block; }
        .box-value { font-size: 0.9em; color: #222; font-weight: bold; }
        
        /* Calendar Wrapper */
        .calendar-wrapper { flex: 1; display: flex; overflow-x: auto; scroll-snap-type: x mandatory; padding: 20px 0; gap: 25px; align-items: center; padding-inline: 15vw; scroll-behavior: smooth; }
        .calendar-wrapper::-webkit-scrollbar { display: none; }
        
        .month-card { min-width: 320px; background: white; border-radius: 24px; scroll-snap-align: center; flex-shrink: 0; height: 420px; display: flex; flex-direction: column; box-shadow: 0 4px 15px rgba(0,0,0,0.08); border: 1px solid #ddd; }
        .month-title { padding: 15px; font-weight: 900; text-align: center; font-size: 1.2em; border-bottom: 1px solid #f0f0f0; color: var(--eth-blue); }
        
        .days-header { display: grid; grid-template-columns: repeat(7, 1fr); background: #f8f9fa; color: #666; text-align: center; padding: 10px 0; font-size: 0.7em; font-weight: bold; }
        
        .grid { display: grid; grid-template-columns: repeat(7, 1fr); background: #eee; gap: 1px; flex: 1; }
        .cell { background: white; display: flex; align-items: center; justify-content: center; font-weight: 700; cursor: pointer; -webkit-tap-highlight-color: transparent; }
        .cell:active { background: #e3f2fd; }
        
        .today-mark { background: var(--eth-blue) !important; color: white !important; border-radius: 8px; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; }

        /* Countdown Area */
        #countdownContainer { max-height: 250px; overflow-y: auto; background: #1a1a1a; padding: 15px; border-top: 4px solid var(--eth-blue); }
        .countdown-item { background: #2a2a2a; color: white; margin-bottom: 10px; padding: 15px; border-radius: 12px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--adwa-red); }
        .item-timer { font-family: 'Courier New', monospace; color: #00ff00; font-size: 1.1em; font-weight: bold; }

        /* Pop-up Modal (English as requested) */
        #countdownModal { display: none; position: fixed; bottom: 0; width: 100%; background: white; padding: 25px; border-radius: 25px 25px 0 0; z-index: 2000; box-sizing: border-box; }
        #overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1500; }
        .delete-btn { background: #ff4444; color: white; border: none; border-radius: 6px; padding: 5px 10px; font-size: 0.8em; }
    </style>
</head>
<body>

    <div class="header">የኢትዮጵያ ዘመን አቆጣጠር (2018)</div>

    <div class="dashboard">
        <div class="info-box"><span class="box-label">ዛሬ</span><span class="box-value">የካቲት 23</span></div>
        <div class="info-box"><span class="box-label">ወር</span><span class="box-value">የካቲት</span></div>
        <div class="info-box"><span class="box-label">ዓመት</span><span class="box-value">2018</span></div>
    </div>

    <div class="calendar-wrapper" id="main-calendar"></div>

    <div id="countdownContainer">
        <div id="listBody"></div>
    </div>

    <div id="overlay" onclick="closeModal()"></div>
    <div id="countdownModal">
        <h3 id="modalHead" style="margin:0 0 10px 0;">New Countdown ⏳</h3>
        <input type="text" id="userNote" placeholder="Event Name (e.g. My Trip)" style="width:100%; padding:15px; border:1px solid #ddd; border-radius:12px; margin-bottom:15px; box-sizing:border-box; font-size: 1rem;">
        <button onclick="addCountdown()" style="background:var(--eth-blue); color:white; border:none; padding:15px; border-radius:12px; width:100%; font-weight:bold; font-size: 1rem;">Start Ticking</button>
        <button onclick="closeModal()" style="background:transparent; color:#888; border:none; padding:10px; width:100%; margin-top:5px;">Cancel</button>
    </div>

    <script>
        const amhMonths = ["መስከረም", "ጥቅምት", "ኅዳር", "ታኅሣሥ", "ጥር", "የካቲት", "መጋቢት", "ሚያዝያ", "ግንቦት", "ሰኔ", "ሐምሌ", "ነሐሴ", "ጳጉሜን"];
        let targetDay, targetMonthIdx, targetMonthName;
        let countdowns = JSON.parse(localStorage.getItem('ethioFlow_Final')) || [];

        function generateCalendar() {
            const wrapper = document.getElementById('main-calendar');
            amhMonths.forEach((name, mIdx) => {
                const daysInMonth = (mIdx === 12) ? 6 : 30; 
                let cellsHtml = "";
                for (let i = 1; i <= daysInMonth; i++) {
                    const isToday = (name === "የካቲት" && i === 23);
                    const cellClass = isToday ? 'cell today-mark' : 'cell';
                    cellsHtml += `<div class="${cellClass}" onclick="openModal('${name}', ${i}, ${mIdx})">${i}</div>`;
                }
                wrapper.innerHTML += `
                    <div class="month-card" id="month-${mIdx}">
                        <div class="month-title">${name} 2018</div>
                        <div class="days-header">
                            <span>እሁ</span><span>ሰኞ</span><span>ማክ</span><span>ረቡ</span><span>ሐሙ</span><span>አር</span><span>ቅዳ</span>
                        </div>
                        <div class="grid">${cellsHtml}</div>
                    </div>`;
            });
            setTimeout(() => document.getElementById('month-5').scrollIntoView({inline:'center'}), 300);
            renderList();
        }

        function openModal(month, day, mIdx) {
            targetDay = day; targetMonthIdx = mIdx; targetMonthName = month;
            document.getElementById('modalHead').innerText = `Set for: ${month} ${day}`;
            document.getElementById('overlay').style.display = 'block';
            document.getElementById('countdownModal').style.display = 'block';
            document.getElementById('userNote').focus();
        }

        function closeModal() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('countdownModal').style.display = 'none';
        }

        function addCountdown() {
            const note = document.getElementById('userNote').value || "Event";
            const currentEthMonthIdx = 5; // Yekatit
            const currentEthDay = 23;
            const diffInDays = ((targetMonthIdx * 30) + targetDay) - ((currentEthMonthIdx * 30) + currentEthDay);

            if(diffInDays < 0) { alert("Please select a future date!"); return; }

            // Precise Midnight Calculation
            const tonightMidnight = new Date();
            tonightMidnight.setHours(24, 0, 0, 0); 

            const targetTimestamp = tonightMidnight.getTime() + ((diffInDays - 1) * 86400000);

            countdowns.push({ id: Date.now(), note, targetTimestamp, monthName: targetMonthName, day: targetDay });
            localStorage.setItem('ethioFlow_Final', JSON.stringify(countdowns));
            document.getElementById('userNote').value = "";
            closeModal();
            renderList();
        }

        function renderList() {
            const list = document.getElementById('listBody');
            list.innerHTML = countdowns.length === 0 ? '<div style="color:#666; text-align:center; font-size:0.8em;">No Active Events</div>' : "";
            countdowns.forEach(item => {
                list.innerHTML += `
                    <div class="countdown-item">
                        <div style="display:flex; flex-direction:column;">
                            <span style="font-size:0.7em; color:#aaa; text-transform:uppercase;">${item.note}</span>
                            <span class="item-timer" id="timer-${item.id}">--:--:--</span>
                        </div>
                        <button class="delete-btn" onclick="deleteItem(${item.id})">Remove</button>
                    </div>`;
            });
        }

        function deleteItem(id) {
            countdowns = countdowns.filter(c => c.id !== id);
            localStorage.setItem('ethioFlow_Final', JSON.stringify(countdowns));
            renderList();
        }

        setInterval(() => {
            const now = Date.now();
            countdowns.forEach(item => {
                const el = document.getElementById(`timer-${item.id}`);
                if(!el) return;
                const dist = item.targetTimestamp - now;
                if(dist < 0) { el.innerText = "DUE NOW!"; el.style.color = "#ff4444"; return; }
                
                const d = Math.floor(dist / 86400000);
                const h = Math.floor((dist % 86400000) / 3600000);
                const m = Math.floor((dist % 3600000) / 60000);
                const s = Math.floor((dist % 60000) / 1000);
                el.innerText = `${d}d ${h}h ${m}m ${s}s`;
            });
        }, 1000);

        window.onload = generateCalendar;
    </script>
</body>
</html>
