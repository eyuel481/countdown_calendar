<!DOCTYPE html>
<html>
<body>
<script>
    const MASTER_KEY = 'ETHIO_FLOW_MASTER_STORAGE';
    window.addEventListener('message', (e) => {
        if (e.data.type === 'SAVE') {
            localStorage.setItem(MASTER_KEY, JSON.stringify(e.data.payload));
        } else if (e.data.type === 'GET') {
            const data = JSON.parse(localStorage.getItem(MASTER_KEY)) || [];
            e.source.postMessage({ type: 'LOAD_DATA', payload: data }, e.origin);
        }
    });
</script>
</body>
</html>
